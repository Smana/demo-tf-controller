---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: route53-zone-cloud
spec:
  approvePlan: auto
  destroyResourcesOnDeletion: false # Keep the zone after deletion
  interval: 8m
  path: ./modules/zones
  sourceRef:
    kind: GitRepository
    name: terraform-aws-route53
    namespace: flux-system
  vars:
    - name: domain_name
      value: "${domain_name}"
    - name: comment
      value: "Experimentations for blog.ogenki.io"
    - name: tags
      value:
        Name: "${domain_name}"
  writeOutputsToSecret:
    name: route53-zone-cloud
